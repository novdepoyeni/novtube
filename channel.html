<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanal | NovTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .channel-header-section {
            background: linear-gradient(to bottom, #111, #050505);
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 1px solid #1f1f1f;
        }
        .ch-logo-big {
            width: 100px; height: 100px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #ffffff, #cccccc); color: #000;
            border-radius: 50%; font-size: 40px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); border: 4px solid #000; outline: 2px solid #333;
        }
        .ch-name { font-size: 28px; color: #fff; margin-bottom: 10px; }
        .ch-info { font-size: 14px; color: #888; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">Nov<span>Tube</span></a>
        </div>
        <div class="nav-right">
            <a href="customers.html" style="color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #333; padding: 6px 12px; border-radius: 20px;"><i class="fas fa-arrow-left"></i> İş Ortaklarına Dön</a>
        </div>
    </header>

    <div class="channel-header-section" id="ch-header">
        <!-- JS ile Dolacak -->
    </div>

    <main class="main-container" style="display: block; overflow-y: auto;">
        <h3 style="padding: 20px 20px 0; color: #fff; border-bottom: 1px solid #222; padding-bottom: 10px; max-width: 1600px; margin: 0 auto;">Markaya Ait Referanslar</h3>
        
        <section class="video-grid" id="channel-videos" style="background: transparent;">
            <!-- Videolar Buraya Gelecek (Ana sayfadaki mükemmel çerçeveli tasarımın aynısı) -->
        </section>
    </main>

    <nav class="mobile-bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Ana Sayfa</span></a>
        <a href="shorts.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>Kısa Videolar</span></a>
        <a href="customers.html" class="nav-item active"><i class="fa-solid fa-handshake"></i><span>Müşteriler</span></a>
    </nav>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('name');
        
        // Bu markaya ait tüm videoları filtrele
        const channelVids = videosData.filter(v => v.customer.name === channelName);
        
        if (channelVids.length > 0) {
            const customer = channelVids[0].customer;
            
            // 1. Kanal Üst Bilgisini Doldur
            document.getElementById('ch-header').innerHTML = `
                <div class="ch-logo-big">${customer.name.charAt(0)}</div>
                <h1 class="ch-name">${customer.name}</h1>
                <div class="ch-info">
                    <span><i class="fas fa-map-marker-alt"></i> ${customer.address}</span>
                    <span><i class="fas fa-phone"></i> ${customer.phone}</span>
                </div>
            `;
            
            document.title = `${customer.name} Referansları | NovTube`;

            // 2. Videoları Ana Sayfadaki Premium Çerçeveyle Diz
            const grid = document.getElementById('channel-videos');
            channelVids.forEach(video => {
                const card = document.createElement('div');
                card.classList.add('video-card');
                card.innerHTML = `
                    <div class="preview-container">
                        <video class="preview-video" src="${video.videoSrc}" muted loop playsinline preload="metadata"></video>
                        <div class="click-overlay"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-details">
                            <h3 class="video-title">${video.title}</h3>
                            <p class="video-channel">${video.date}</p>
                        </div>
                    </div>
                `;
                
                // Tıklayınca İzleme Sayfasına Git
                card.querySelector('.click-overlay').addEventListener('click', () => {
                    window.location.href = `video.html?id=${video.id}`;
                });

                // Fareyle üstüne gelince oynatma efekti
                const vid = card.querySelector('.preview-video');
                card.addEventListener('mouseenter', () => vid.play());
                card.addEventListener('mouseleave', () => vid.pause());
                
                grid.appendChild(card);
            });

            // 3. Google SEO (CollectionPage Şeması)
            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify({
                "@context": "https://schema.org",
                "@type": "CollectionPage",
                "name": `${customer.name} NovTube Kanalı`,
                "description": `${customer.name} firması için hazırlanan kurumsal prodüksiyon ve tasarım referansları.`,
                "provider": { "@type": "Organization", "name": "NOV" },
                "about": { "@type": "LocalBusiness", "name": customer.name, "address": customer.address }
            });
            document.head.appendChild(script);

        } else {
            document.getElementById('ch-header').innerHTML = `<h1 class="ch-name">Kanal Bulunamadı</h1>`;
        }
    </script>
</body>
</html>
