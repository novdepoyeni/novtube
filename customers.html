<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteriler & Kanallar | NovTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .customers-list { padding: 20px; max-width: 800px; margin: 0 auto; }
        .channel-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #262626; cursor: pointer; transition: 0.2s; }
        .channel-row:hover { background-color: #1a1a1a; border-radius: 8px; border-bottom-color: transparent; }
        .channel-left { display: flex; align-items: center; gap: 15px; }
        .ch-logo { width: 50px; height: 50px; background: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
        .ch-info h3 { color: #fff; font-size: 16px; margin-bottom: 4px; }
        .ch-info p { color: #aaa; font-size: 13px; }
        .view-btn { color: #fff; background: #333; padding: 6px 12px; border-radius: 20px; font-size: 12px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left"><a href="index.html" class="logo">Nov<span>Tube</span></a></div>
    </header>

    <main class="customers-list" id="customers-container">
        <h2 style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">İş Ortakları Kanalları</h2>
        </main>

    <nav class="mobile-bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Ana Sayfa</span></a>
        <a href="shorts.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>Kısa Videolar</span></a>
        <a href="customers.html" class="nav-item active"><i class="fa-solid fa-handshake"></i><span>Müşteriler</span></a>
    </nav>

    <script src="data.js"></script>
    <script>
        // data.js'deki videolardan müşterileri filtrele ve listele
        const container = document.getElementById('customers-container');
        const uniqueCustomers = [];
        const seenNames = new Set();

        videosData.forEach(v => {
            if(!seenNames.has(v.customer.name)) {
                seenNames.add(v.customer.name);
                uniqueCustomers.push(v.customer);
            }
        });

        uniqueCustomers.forEach(customer => {
            const row = document.createElement('div');
            row.classList.add('channel-row');
            row.onclick = () => window.location.href = `channel.html?name=${encodeURIComponent(customer.name)}`;
            
            row.innerHTML = `
                <div class="channel-left">
                    <div class="ch-logo">${customer.name.charAt(0)}</div>
                    <div class="ch-info">
                        <h3>${customer.name}</h3>
                        <p>${customer.services.join(' • ')}</p>
                    </div>
                </div>
                <button class="view-btn">Kanalı Gör</button>
            `;
            container.appendChild(row);
        });
    </script>
</body>
</html>
