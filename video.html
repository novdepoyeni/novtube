<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Yükleniyor... | NovTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <i class="fas fa-bars menu-icon" id="menu-toggle"></i>
            <a href="index.html" class="logo">Nov<span>Tube</span></a>
        </div>
        </header>

    <main class="watch-container">
        
        <section class="watch-main">
<div class="player-wrapper" id="custom-player">
    <video id="main-video" playsinline></video>
    
    <div class="skip-effect" id="skip-effect">
        <i class="fas fa-forward"></i>
        <span>10s</span>
    </div>

    <div class="player-controls">
        <div class="progress-area">
            <div class="progress-bar"><div class="progress-filled"></div></div>
        </div>
        
        <div class="controls-main">
            <div class="controls-left">
                <button class="player-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                <span class="time-display" id="time-display">0:00 / 0:00</span>
            </div>
            
            <div class="controls-right">
                <!-- Hız Seçici Menü -->
<div class="speed-selector">
    <button class="player-btn speed-btn" id="current-speed">1x</button>
    <div class="speed-dropdown">
        <div class="s-option" data-speed="0.5">0.5x</div>
        <div class="s-option" data-speed="0.75">0.75x</div>
        <div class="s-option active" data-speed="1">1x (Normal)</div>
        <div class="s-option" data-speed="1.25">1.25x</div>
        <div class="s-option" data-speed="1.5">1.5x</div>
        <div class="s-option" data-speed="2">2x</div>
    </div>
</div>
                <button class="player-btn" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>
</div>

            <div class="video-details-section">
                <h1 id="watch-title" class="watch-video-title">Video Yükleniyor...</h1>
                <p class="upload-date" id="watch-date"></p>
                <div class="video-description-box">
                    <p class="description-text" id="watch-description">
                        Bu proje NOV tarafından profesyonel olarak hazırlanmış ve yayına alınmıştır.
                    </p>
                </div>
            </div>
        </section>

        <aside class="watch-sidebar">
            
            <div class="customer-card" id="customer-card">
                <div class="customer-header">
                    <div class="customer-logo" id="customer-initial">C</div>
                    <div class="customer-title-wrap">
                        <h3 id="customer-name">Müşteri Adı</h3>
                        <span class="customer-badge">Kurumsal Referans</span>
                    </div>
                </div>
                <div class="customer-body">
                    <p><i class="fas fa-map-marker-alt"></i> <span id="customer-address">Adres Bilgisi</span></p>
                    <p><i class="fas fa-phone-alt"></i> <span id="customer-phone">Telefon Bilgisi</span></p>
                    <div class="provided-services" id="customer-services">
                        </div>
                </div>
            </div>

            <div id="suggested-videos">
                <h4 class="sidebar-heading">Diğer Çalışmalar</h4>
                </div>

        </aside>

    </main>


<nav class="mobile-bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Ana Sayfa</span>
        </a>
        <a href="shorts.html" class="nav-item">
            <i class="fa-solid fa-bolt"></i>
            <span>Kısa Videolar</span>
        </a>
        <a href="customers.html" class="nav-item">
            <i class="fa-solid fa-handshake"></i>
            <span>Müşteriler</span>
        </a>
    </nav>

<script src="data.js"></script> 
<script src="video-script.js"></script>
</body>
</html>
